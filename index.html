<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
  font-size:15px;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.login-box input, .login-box button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  font-size:14px;
}

.login-box input {background:#222;color:white;}
.login-box button {background:red;color:white;}

#errorLogin {color:#ff4d4d;}

/* HEADER */
#userInfo {
  text-align:center;
  margin-top:10px;
  font-weight:bold;
  font-size:16px;
}

/* BOTONES */
.top-buttons {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.btn-salir, .btn-admin {
  padding:8px 18px;
  border-radius:8px;
  font-size:13px;
}

.btn-salir {background:red;}
.btn-admin {background:#007bff;display:none;}

/* PORTADA */
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {text-align:center;font-size:24px;}
.sub {text-align:center;color:gray;font-size:14px;}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.menu-card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.menu-card p {
  font-size:16px;
}

/* PRODUCTOS */
#productos {
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.card h3 {font-size:16px;}
.card p {font-size:14px;}

/* DETALLE */
.detalle-img {
  width:100%;
  border-radius:15px;
}

/* FILA */
.fila-opciones {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  gap:10px;
  text-align:center;
  font-size:14px;
}

.fila-opciones div {
  flex:1;
}

/* COLORES */
.stock {
  color:#00ff88;
  font-weight:bold;
  margin-left:5px;
  font-size:15px;
}

.total {
  color:#00aaff;
  font-weight:bold;
  margin-left:5px;
  font-size:15px;
}

/* SELECT */
select {
  background:#222;
  color:white;
  border:none;
  border-radius:8px;
  padding:6px;
  margin-left:5px;
  font-size:14px;
}

/* TABLA */
table {
  width:100%;
  margin-top:10px;
  background:#111;
  border-radius:10px;
  text-align:center;
}

th,td {
  padding:8px;
  font-size:14px;
}

/* BOTONES */
button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  font-size:15px;
}

h2 {text-align:center;}

#panel {display:none;padding:20px;}

/* NUEVO */
#carritoVista {display:none;padding:10px;}
</style>
</head>

<body>

<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button style="background:green;" onclick="verCarrito()">🛒</button>
  <button class="btn-admin" id="panelBtn" onclick="abrirPanel()">Panel</button>
</div>

<div id="portada">
  <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG">
  <div class="titulo">CONTROL DE INVENTARIO</div>
  <div class="sub">---</div>
</div>

<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')"><img src="https://lh3.googleusercontent.com/d/1ndTNY35U3vt6Pu5dFtgcLpNS9DqmMemK"><p>INVIERNO</p></div>
  <div class="menu-card" onclick="abrir('VERANO')"><img src="https://lh3.googleusercontent.com/d/1-SOYaQM1NdW1UrNFCdLjuzb2l6eIvNOx"><p>VERANO</p></div>
</div>

<div id="productos"></div>
<div id="carritoVista"></div>

<div id="panel">
  <h2>Panel Admin</h2>
  <button onclick="abrirFormulario()">➕ Agregar Producto</button>
  <button onclick="verVentas()">📊 Ver Ventas</button>
  <button onclick="inicio()">⬅ Volver</button>
</div>

</div>

<script>

// 🔥 NUEVO
let carrito=[];

function verCarrito(){

  productos.style.display="none";
  menu.style.display="none";
  carritoVista.style.display="block";

  let html=`<h2>🛒 Carrito</h2>`;

  if(carrito.length===0){
    html+=`<p style="text-align:center;">Carrito vacío</p>
    <button onclick="cerrarCarrito()">⬅ Volver</button>`;
    carritoVista.innerHTML=html;
    return;
  }

  let total=0;

  html+=`<table>
  <tr><th>Talla</th><th>Color</th><th>Cant</th><th>Total</th></tr>`;

  carrito.forEach((c,i)=>{
    let precio=(c.cantidad>=12)?c.docena:c.unidad;
    let sub=precio*c.cantidad;
    total+=sub;

    html+=`
    <tr>
      <td>${c.talla}</td>
      <td>${c.color}</td>
      <td>
        <button onclick="restar(${i})">-</button>
        ${c.cantidad}
        <button onclick="sumar(${i})">+</button>
      </td>
      <td>S/ ${sub}</td>
    </tr>`;
  });

  html+=`</table>

  <input id="desc" placeholder="Descuento">
  <button onclick="aplicarDescuento()">Aplicar</button>

  <h3>TOTAL: S/ <span id="totalFinal">${total}</span></h3>

  <button onclick="cerrarCarrito()">⬅ Volver</button>`;

  carritoVista.innerHTML=html;
}

function cerrarCarrito(){
  carritoVista.style.display="none";
  productos.style.display="grid";
}

function sumar(i){carrito[i].cantidad++;verCarrito();}
function restar(i){carrito[i].cantidad--;if(carrito[i].cantidad<=0)carrito.splice(i,1);verCarrito();}

function aplicarDescuento(){
  let t=parseFloat(totalFinal.innerText);
  let d=parseFloat(desc.value)||0;
  totalFinal.innerText=(t-d);
}

</script>

</body>
</html>
