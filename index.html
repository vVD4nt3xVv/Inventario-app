<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
  font-size:15px;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.login-box input, .login-box button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  font-size:14px;
}

.login-box input {background:#222;color:white;}
.login-box button {background:red;color:white;}

#errorLogin {color:#ff4d4d;}

/* HEADER */
#userInfo {
  text-align:center;
  margin-top:10px;
  font-weight:bold;
  font-size:16px;
}

/* BOTONES */
.top-buttons {
  display:flex;
  justify-content:space-between;
  margin:10px;
}

.btn-salir {background:red;}
.btn-carrito {background:#00c853;}
.btn-admin {background:#007bff;display:none;}

.top-buttons button{
  padding:8px 18px;
  border-radius:8px;
  font-size:13px;
}

/* PORTADA */
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {text-align:center;font-size:24px;}
.sub {text-align:center;color:gray;font-size:14px;}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.menu-card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.menu-card p {
  font-size:16px;
}

/* PRODUCTOS */
#productos {
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.card h3 {font-size:16px;}
.card p {font-size:14px;}

/* DETALLE */
.detalle-img {
  width:100%;
  border-radius:15px;
}

/* FILA */
.fila-opciones {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  gap:10px;
  text-align:center;
  font-size:14px;
}

.fila-opciones div {
  flex:1;
}

/* BOTONES DETALLE */
.fila-botones {
  display:flex;
  justify-content:space-between;
  gap:10px;
}
.fila-botones button {
  width:50%;
}

/* COLORES */
.stock {color:#00ff88;font-weight:bold;}
.total {color:#00aaff;font-weight:bold;}

select {
  background:#222;
  color:white;
  border:none;
  border-radius:8px;
  padding:6px;
}

/* TABLA */
table {
  width:100%;
  margin-top:10px;
  background:#111;
  border-radius:10px;
  text-align:center;
}

th,td {padding:8px;font-size:14px;}

button {
  border:none;
  border-radius:10px;
  padding:10px;
  color:white;
}

h2 {text-align:center;}

#panel {display:none;padding:20px;}

/* TOAST */
#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px 20px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}
#toast.show {opacity:1;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-carrito" onclick="verCarrito()">🛒</button>
  <button class="btn-admin" id="panelBtn" onclick="abrirPanel()">Panel</button>
</div>

<div id="portada">
  <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG">
  <div class="titulo">CONTROL DE INVENTARIO</div>
  <div class="sub">-----------------------------------------------------------------------------------</div>
</div>

<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')"><img src="https://lh3.googleusercontent.com/d/1ndTNY35U3vt6Pu5dFtgcLpNS9DqmMemK"><p>INVIERNO</p></div>
  <div class="menu-card" onclick="abrir('VERANO')"><img src="https://lh3.googleusercontent.com/d/1-SOYaQM1NdW1UrNFCdLjuzb2l6eIvNOx"><p>VERANO</p></div>
  <div class="menu-card" onclick="abrir('TECNOLOGIA')"><img src="https://lh3.googleusercontent.com/d/1EEwUFXk3iC6QvMtb29gh3ySLuQRK_aPq"><p>TECNOLOGIA</p></div>
  <div class="menu-card" onclick="abrir('NAVIDEÑO')"><img src="https://lh3.googleusercontent.com/d/1HnwTLL0kiuRe7AC_PusCq5UNvKDIlN6p"><p>NAVIDEÑO</p></div>
</div>

<div id="productos"></div>

<div id="panel">
  <h2>Panel Admin</h2>
  <button onclick="abrirFormulario()">➕ Agregar Producto</button>
  <button onclick="verVentas()">📊 Ver Ventas</button>
  <button onclick="inicio()">⬅ Volver</button>
</div>

</div>

<div id="toast"></div>

<script>

// NUEVO
let carrito=[];
let detalleActual=[];

// (TODO TU CODIGO ORIGINAL SE MANTIENE IGUAL HASTA ABAJO...)

// SOLO CAMBIAMOS ESTAS FUNCIONES:

function verCarrito(){

  let html=`<h2 style="text-align:center;">🛒 Carrito</h2>`;

  if(carrito.length===0){
    html+=`<p style="text-align:center;">Carrito vacío</p>`;
    html+=`<button onclick="inicio()">⬅ Volver</button>`;
    productos.innerHTML=html;
    return;
  }

  let total=0;

  html+=`<table>
  <tr>
  <th>Producto</th>
  <th>Talla</th>
  <th>Color</th>
  <th>Cant</th>
  <th>Precio</th>
  <th>Sub</th>
  <th></th>
  </tr>`;

  carrito.forEach((c,i)=>{
    let precio=(c.cantidad>=12)?c.docena:c.unidad;
    let sub=precio*c.cantidad;
    total+=sub;

    html+=`
    <tr>
    <td>${c.producto}</td>
    <td>${c.talla}</td>
    <td>${c.color}</td>
    <td>
      <button onclick="restar(${i})">-</button>
      ${c.cantidad}
      <button onclick="sumar(${i})">+</button>
    </td>
    <td style="text-align:right;">S/ ${precio}</td>
    <td style="text-align:right;">S/ ${sub.toFixed(2)}</td>
    <td><button onclick="eliminarItem(${i})">❌</button></td>
    </tr>`;
  });

  html+=`</table>

  <div style="text-align:center;margin-top:10px;">
    <input id="desc" type="number" placeholder="Descuento">
    <button onclick="aplicarDesc()">Aplicar</button>
  </div>

  <h3 style="text-align:center;">TOTAL: S/ <span id="totalFinal">${total.toFixed(2)}</span></h3>

  <div class="fila-botones">
    <button onclick="inicio()">⬅ Volver</button>
    <button style="background:#00c853;" onclick="comprar()">COMPRAR</button>
  </div>`;

  productos.innerHTML=html;
}

function aplicarDesc(){
  let total=parseFloat(document.getElementById("totalFinal").innerText);
  let d=parseFloat(document.getElementById("desc").value)||0;
  if(d>total)d=total;

  let final=total-d;
  document.getElementById("totalFinal").innerText=final.toFixed(2);

  mostrarToast("Descuento aplicado","green");
}

function comprar(){
  let total=parseFloat(document.getElementById("totalFinal").innerText)||0;
  mostrarToast("Venta S/ "+total,"green");
  carrito=[];
  inicio();
}

</script>

</body>
</html>
