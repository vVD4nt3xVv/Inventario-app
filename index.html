<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
  font-size:15px;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.login-box input, .login-box button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  font-size:14px;
}

.login-box input {background:#222;color:white;}
.login-box button {background:red;color:white;}

#errorLogin {color:#ff4d4d;}

/* HEADER */
#userInfo {
  text-align:center;
  margin-top:10px;
  font-weight:bold;
  font-size:16px;
}

/* BOTONES */
.top-buttons {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.btn-salir, .btn-admin {
  padding:8px 18px;
  border-radius:8px;
  font-size:13px;
}

.btn-salir {background:red;}
.btn-admin {background:#007bff;display:none;}
.btn-carrito {background:#00c853;}

/* PORTADA */
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {text-align:center;font-size:24px;}
.sub {text-align:center;color:gray;font-size:14px;}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.menu-card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.menu-card p {
  font-size:16px;
}

/* PRODUCTOS */
#productos {
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.card h3 {font-size:16px;}
.card p {font-size:14px;}

/* DETALLE */
.detalle-img {
  width:100%;
  border-radius:15px;
}

/* FILA */
.fila-opciones {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  gap:10px;
  text-align:center;
  font-size:14px;
}

.fila-opciones div {
  flex:1;
}

/* NUEVO */
.fila-botones {
  display:flex;
  justify-content:space-between;
  gap:10px;
}
.fila-botones button {
  width:auto;
  flex:1;
}

/* COLORES */
.stock {
  color:#00ff88;
  font-weight:bold;
  margin-left:5px;
  font-size:15px;
}

.total {
  color:#00aaff;
  font-weight:bold;
  margin-left:5px;
  font-size:15px;
}

/* SELECT */
select {
  background:#222;
  color:white;
  border:none;
  border-radius:8px;
  padding:6px;
  margin-left:5px;
  font-size:14px;
}

/* RADIO */
input[type="radio"] {
  accent-color:#00ff88;
}

/* TABLA */
table {
  width:100%;
  margin-top:10px;
  background:#111;
  border-radius:10px;
  text-align:center;
}

th,td {
  padding:8px;
  font-size:14px;
}

/* BOTONES */
button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  font-size:15px;
}

h2 {
  text-align:center;
}

#panel {display:none;padding:20px;}

/* TOAST */
#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:10px 20px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}
#toast.show {opacity:1;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-carrito" onclick="verCarrito()">🛒</button>
  <button class="btn-admin" id="panelBtn" onclick="abrirPanel()">Panel</button>
</div>

<div id="portada">
  <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG">
  <div class="titulo">CONTROL DE INVENTARIO</div>
  <div class="sub">-----------------------------------------------------------------------------------</div>
</div>

<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')"><img src="https://lh3.googleusercontent.com/d/1ndTNY35U3vt6Pu5dFtgcLpNS9DqmMemK"><p>INVIERNO</p></div>
  <div class="menu-card" onclick="abrir('VERANO')"><img src="https://lh3.googleusercontent.com/d/1-SOYaQM1NdW1UrNFCdLjuzb2l6eIvNOx"><p>VERANO</p></div>
  <div class="menu-card" onclick="abrir('TECNOLOGIA')"><img src="https://lh3.googleusercontent.com/d/1EEwUFXk3iC6QvMtb29gh3ySLuQRK_aPq"><p>TECNOLOGIA</p></div>
  <div class="menu-card" onclick="abrir('NAVIDEÑO')"><img src="https://lh3.googleusercontent.com/d/1HnwTLL0kiuRe7AC_PusCq5UNvKDIlN6p"><p>NAVIDEÑO</p></div>
</div>

<div id="productos"></div>

<div id="panel">
  <h2>Panel Admin</h2>
  <button onclick="abrirFormulario()">➕ Agregar Producto</button>
  <button onclick="verVentas()">📊 Ver Ventas</button>
  <button onclick="inicio()">⬅ Volver</button>
</div>

</div>

<div id="toast"></div>

<script>

// NUEVO
let carrito=[];
let detalleActual=[];

// USUARIOS
const usuariosSistema = {
  luis:"123",
  katy:"123",
  katherine:"123",
  richard:"123",
  dante:"admin123"
};
const admins = ["dante"];

// LOGIN
function guardarUsuario(){
  const user=usuario.value.toLowerCase();
  const pass=password.value;

  if(!usuariosSistema[user]) return errorLogin.innerText="Usuario no registrado";
  if(usuariosSistema[user]!==pass) return errorLogin.innerText="Contraseña incorrecta";

  localStorage.setItem("usuario",user);
  location.reload();
}

function cerrarSesion(){
  localStorage.removeItem("usuario");
  location.reload();
}

// UI
window.onload=()=>{
  const user=localStorage.getItem("usuario");

  login.style.display=user?"none":"flex";
  app.style.display=user?"block":"none";

  if(user){
    userInfo.innerHTML=`USUARIO: ${user.toUpperCase()}`;
    if(admins.includes(user)) panelBtn.style.display="inline-block";
  }
};

// INVENTARIO
const urlInv="https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";
let inventario=[];

fetch(urlInv)
.then(r=>r.json())
.then(d=>{
  inventario=d.map(p=>{
    let o={};
    Object.keys(p).forEach(k=>o[k.toLowerCase().trim()]=p[k]);

    return {
      id:o.id,
      producto:o.producto,
      categoria:(o.categoria||"").toUpperCase(),
      talla:o.talla,
      color:o.color,
      stock:parseInt(o.stock)||0,
      unidad:o["p.unidad"],
      docena:o["p.docena"],
      imagen:o.imagen
    };
  });
});

// MENU
function abrir(cat){
  menu.style.display="none";
  productos.style.display="grid";

  const filtrados=inventario.filter(p=>p.categoria===cat && p.stock>0);

  const unicos={};
  filtrados.forEach(p=>{ if(!unicos[p.id]) unicos[p.id]=p; });

  render(Object.values(unicos));

  productos.innerHTML+=`<button onclick="inicio()">⬅ Volver</button>`;
}

function inicio(){
  menu.style.display="grid";
  productos.style.display="none";
  panel.style.display="none";
}

// LISTA
function render(lista){
  let html="";
  lista.forEach(p=>{
    html+=`
    <div class="card" onclick="verProducto('${p.id}')">
      <img src="${p.imagen}">
      <h3>${p.producto}</h3>
      <p style="color:lime;">S/ ${p.unidad}</p>
    </div>`;
  });
  productos.innerHTML=html;
}

// DETALLE
function verProducto(id){

  const variantes=inventario.filter(p=>p.id==id);
  const p=variantes[0];

  const tallas=[...new Set(variantes.map(v=>v.talla))];
  const stockTotal=variantes.reduce((a,b)=>a+b.stock,0);

  productos.innerHTML=`
    <div>
      <img class="detalle-img" src="${p.imagen}">
      <h2>${p.producto}</h2>

      <div class="fila-opciones">

        <div>
          🧵 TALLAS
          <select id="tallaSelect" onchange="cambiarTalla('${id}')">
            ${tallas.map(t=>`<option value="${t}">${t}</option>`).join("")}
            <option value="TODAS">TODAS</option>
          </select>
        </div>

        <div>
          📦 STOCK
          <span class="stock" id="stockTalla">0</span>
        </div>

        <div>
          📊 TOTAL
          <span class="total">${stockTotal}</span>
        </div>

      </div>

      <table id="tablaDetalle"></table>

      <div class="fila-botones">
        <button onclick="volverLista('${p.categoria}')">⬅ Volver</button>
        <button style="background:#007bff;" onclick="agregarCarrito()">🛒 Agregar</button>
      </div>
    </div>
  `;

  cambiarTalla(id);
}

// FILTRO
function cambiarTalla(id){
  const talla=document.getElementById("tallaSelect").value;

  let filtrados;

  if(talla==="TODAS"){
    filtrados=inventario.filter(p=>p.id==id);
  } else {
    filtrados=inventario.filter(p=>p.id==id && p.talla==talla);
  }

  detalleActual = filtrados;

  const total=filtrados.reduce((a,b)=>a+b.stock,0);
  document.getElementById("stockTalla").innerText=total;

  let filas=`
    <tr>
      <th></th><th>TALLA</th><th>COLOR</th><th>STOCK</th><th>P.UNIDAD</th><th>P.DOCENA</th>
    </tr>
  `;

  filtrados.forEach((v,i)=>{
    filas+=`
      <tr>
        <td><input type="radio" name="prodSelect"></td>
        <td>${v.talla}</td>
        <td>${v.color}</td>
        <td>${v.stock}</td>
        <td>S/ ${v.unidad}</td>
        <td>S/ ${v.docena}</td>
      </tr>
    `;
  });

  document.getElementById("tablaDetalle").innerHTML=filas;
}

// NUEVAS FUNCIONES
function mostrarToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function agregarCarrito(){
  const radios=document.getElementsByName("prodSelect");
  let index=-1;
  radios.forEach((r,i)=>{ if(r.checked) index=i; });

  if(index===-1){
    mostrarToast("Selecciona producto");
    return;
  }

  const item=detalleActual[index];
  carrito.push({...item,cantidad:1});

  mostrarToast(item.producto+" agregado");
}

function verCarrito(){

  let html="<h2 style='text-align:center;'>🛒 Carrito</h2>";

  if(carrito.length===0){
    html+="<p style='text-align:center;'>Carrito vacío</p>";
    html+=`<div class="fila-botones">
      <button onclick="inicio()">⬅ Volver</button>
    </div>`;
    productos.innerHTML=html;
    return;
  }

  let total=0;

  html+=`
  <table>
  <tr>
  <th>Producto</th>
  <th>Talla</th>
  <th>Color</th>
  <th>Cant</th>
  <th>Precio</th>
  <th></th>
  </tr>`;

  carrito.forEach((c,i)=>{

    let precio=c.unidad;
    if(c.cantidad>=12){
      precio=c.docena/12;
    }

    const subtotal=precio*c.cantidad;
    total+=subtotal;

    html+=`
    <tr>
    <td>${c.producto}</td>
    <td>${c.talla}</td>
    <td>${c.color}</td>
    <td>
    <button onclick="restar(${i})">-</button>
    ${c.cantidad}
    <button onclick="sumar(${i})">+</button>
    </td>
    <td>S/ ${subtotal.toFixed(2)}</td>
    <td><button onclick="eliminarItem(${i})">❌</button></td>
    </tr>`;
  });

  html+=`</table>

  <p style="text-align:center;">P.UNIDAD → cambia a DOCENA desde 12</p>

  <div style="text-align:center;">
  Descuento: <input id="descuento" type="number" value="0" style="width:80px;">
  </div>

  <h3 style="text-align:center;">TOTAL: S/ ${total.toFixed(2)}</h3>

  <div class="fila-botones">
  <button onclick="inicio()">⬅ Volver</button>
  <button style="background:#00c853;" onclick="comprar()">COMPRAR</button>
  </div>`;

  productos.innerHTML=html;
}

function sumar(i){
  carrito[i].cantidad++;
  verCarrito();
}

function restar(i){
  carrito[i].cantidad--;
  if(carrito[i].cantidad<=0){
    carrito.splice(i,1);
  }
  verCarrito();
}

function eliminarItem(i){
  carrito.splice(i,1);
  verCarrito();
}

function comprar(){
  let total=0;
  const desc=parseFloat(document.getElementById("descuento").value)||0;

  carrito.forEach(c=>{
    let precio=c.unidad;
    if(c.cantidad>=12){
      precio=c.docena/12;
    }
    total+=precio*c.cantidad;
  });

  total-=desc;

  mostrarToast("Venta S/ "+total.toFixed(2));

  carrito=[];
  inicio();
}

// VOLVER
function volverLista(cat){
  abrir(cat);
}

// PANEL
function abrirPanel(){
  menu.style.display="none";
  panel.style.display="block";
}

function abrirFormulario(){
  window.open("https://docs.google.com/forms/d/e/1FAIpQLSfkDXdS7HH4ud4ephIeo0qMyiXqiNXLjs_gpmZF7fDqBoE73A/viewform");
}

function verVentas(){
  window.open("https://docs.google.com/spreadsheets/d/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE");
}

</script>

</body>
</html>
