<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&T KAMIARA - Sistema</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: 'Segoe UI', sans-serif; margin: auto; max-width: 480px; }
        
        /* LOGIN ORIGINAL RECONSTRUIDO */
        #login { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%); }
        .login-box { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 80%; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: white; }
        .login-box button { width: 100%; padding: 12px; background: #5cb85c; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* PORTADA */
        #portada img { width: 100%; height: 250px; object-fit: cover; border-radius: 0 0 20px 20px; }
        .titulo { text-align: center; font-weight: bold; font-size: 1.2em; margin-top: 10px; letter-spacing: 2px; }

        /* SISTEMA DE 3 FILAS (BOTONES) */
        .footer-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; margin-top: 20px; }
        .btn-izq { grid-column: 1; background: #d9534f; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; }
        .btn-der { grid-column: 3; background: #5cb85c; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; }

        /* TABLA DE PRODUCTOS */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th { background: #222; padding: 10px; border-bottom: 2px solid #333; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #222; }
        .select-check { transform: scale(1.3); cursor: pointer; }

        /* VOUCHER ESTILO TICKET */
        .factura-box { background: white; color: black; padding: 20px; border-radius: 5px; font-family: monospace; font-size: 12px; line-height: 1.2; }
        
        .toast-container { position: fixed; top: 20px; width: 100%; display: flex; justify-content: center; z-index: 9999; }
        .toast { padding: 10px 20px; border-radius: 5px; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h2 style="color:#5cb85c">A&T KAMIARA</h2>
    <p>Inicie sesión para continuar</p>
    <input id="inputUsuario" placeholder="Usuario">
    <input id="inputPassword" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">ENTRAR</button>
    <p id="errorLogin" style="color:red; font-size:12px;"></p>
  </div>
</div>

<div id="app" style="display:none;">
    <div id="main-content">
        <div id="portada">
          <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG">
          <div class="titulo">CONTROL DE INVENTARIO</div>
        </div>
        
        <div id="menu" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; padding:15px;">
          <!-- Se llena dinámicamente -->
        </div>

        <div id="productos-vista" style="display:none;"></div>
    </div>

    <div id="carrito-vista" style="display:none; padding:15px;"></div>
    <div id="voucher-vista" style="display:none; padding:15px;"></div>
</div>

<script src="app.js"></script>
</body>
</html>
