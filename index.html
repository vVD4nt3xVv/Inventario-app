<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
  font-size:15px;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.login-box input, .login-box button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
}

.login-box input {background:#222;color:white;}
.login-box button {background:red;color:white;}

#errorLogin {color:#ff4d4d;}

/* HEADER */
#userInfo {text-align:center;margin-top:10px;font-weight:bold;}

.top-buttons {
  display:flex;
  justify-content:space-between;
  margin:10px;
}

.btn-salir {background:red;}
.btn-carrito {background:#00c853;}
.btn-admin {background:#007bff;display:none;}

.top-buttons button {
  padding:8px 12px;
  border-radius:8px;
  border:none;
  color:white;
}

/* PORTADA */
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {text-align:center;font-size:24px;}
.sub {text-align:center;color:gray;font-size:14px;}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}
.menu-card:hover {transform:scale(1.03);}

.menu-card img {width:100%;height:120px;object-fit:cover;}

/* PRODUCTOS */
#productos {display:none; padding:10px;}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}
.card:hover {transform:scale(1.03);}

.card img {width:100%;height:140px;object-fit:cover;border-radius:10px;}

.detalle-img {width:100%;border-radius:15px;}

/* FILA */
.fila-opciones {
  display:flex;
  justify-content:space-between;
  background:#111;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.stock {color:#00ff88;}
.total {color:#00aaff;}

table {
  width:100%;
  margin-top:10px;
  background:#111;
  border-radius:10px;
}

th,td {padding:8px;text-align:center;font-size:14px;}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  color:white;
}

/* TOAST */
#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:12px 20px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
  z-index:999;
}
#toast.show {opacity:1;}

h2{text-align:center;}

#panel {display:none;padding:20px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-carrito" onclick="verCarrito()">🛒</button>
  <button class="btn-admin" id="panelBtn" onclick="abrirPanel()">Panel</button>
</div>

<div id="portada">
  <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG">
  <div class="titulo">CONTROL DE INVENTARIO</div>
  <div class="sub">------------------------------------------</div>
</div>

<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')"><img src="https://lh3.googleusercontent.com/d/1ndTNY35U3vt6Pu5dFtgcLpNS9DqmMemK"><p>INVIERNO</p></div>
  <div class="menu-card" onclick="abrir('VERANO')"><img src="https://lh3.googleusercontent.com/d/1-SOYaQM1NdW1UrNFCdLjuzb2l6eIvNOx"><p>VERANO</p></div>
  <div class="menu-card" onclick="abrir('TECNOLOGIA')"><img src="https://lh3.googleusercontent.com/d/1EEwUFXk3iC6QvMtb29gh3ySLuQRK_aPq"><p>TECNOLOGIA</p></div>
  <div class="menu-card" onclick="abrir('NAVIDEÑO')"><img src="https://lh3.googleusercontent.com/d/1HnwTLL0kiuRe7AC_PusCq5UNvKDIlN6p"><p>NAVIDEÑO</p></div>
</div>

<div id="productos"></div>

<div id="panel">
  <h2>Panel Admin</h2>
  <button onclick="abrirFormulario()">➕ Agregar Producto</button>
  <button onclick="verVentas()">📊 Ver Ventas</button>
  <button onclick="inicio()">⬅ Volver</button>
</div>

</div>

<div id="toast"></div>

<script>

// USUARIOS
const usuariosSistema={
  luis:"123",katy:"123",katherine:"123",richard:"123",dante:"admin123"
};
const admins=["dante"];

// LOGIN
function guardarUsuario(){
  const user=usuario.value.toLowerCase();
  const pass=password.value;

  if(!usuariosSistema[user]) return errorLogin.innerText="Usuario no registrado";
  if(usuariosSistema[user]!==pass) return errorLogin.innerText="Contraseña incorrecta";

  localStorage.setItem("usuario",user);
  location.reload();
}

function cerrarSesion(){
  localStorage.removeItem("usuario");
  location.reload();
}

window.onload=()=>{
  const user=localStorage.getItem("usuario");

  login.style.display=user?"none":"flex";
  app.style.display=user?"block":"none";

  if(user){
    userInfo.innerHTML=`USUARIO: ${user.toUpperCase()}`;
    if(admins.includes(user)) panelBtn.style.display="inline-block";
  }
};

// TOAST
function mostrarToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

// INVENTARIO
const urlInv="https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";
let inventario=[];
let carrito=[];

fetch(urlInv)
.then(r=>r.json())
.then(d=>{
  inventario=d.map(p=>{
    let o={};
    Object.keys(p).forEach(k=>o[k.toLowerCase().trim()]=p[k]);

    return {
      id:o.id,
      producto:o.producto,
      categoria:(o.categoria||"").toUpperCase(),
      talla:o.talla,
      color:o.color,
      stock:parseInt(o.stock)||0,
      unidad:parseFloat(o["p.unidad"])||0,
      docena:parseFloat(o["p.docena"])||0,
      imagen:o.imagen
    };
  });
});

// MENU
function abrir(cat){
  if(inventario.length===0){mostrarToast("Cargando...");return;}

  menu.style.display="none";
  productos.style.display="block";

  const filtrados=inventario.filter(p=>p.categoria===cat && p.stock>0);

  let html="";
  filtrados.forEach(p=>{
    html+=`
    <div class="card" onclick="verProducto('${p.id}')">
      <img src="${p.imagen}">
      <h3>${p.producto}</h3>
      <p style="color:lime;">S/ ${p.unidad}</p>
    </div>`;
  });

  productos.innerHTML=html+`<button onclick="inicio()">⬅ Volver</button>`;
}

function inicio(){
  menu.style.display="grid";
  productos.style.display="none";
  panel.style.display="none";
}

// DETALLE
function verProducto(id){

  const variantes=inventario.filter(p=>p.id==id);
  const p=variantes[0];

  let html=`
    <img class="detalle-img" src="${p.imagen}">
    <h2>${p.producto}</h2>

    <table>
    <tr><th></th><th>Talla</th><th>Color</th><th>Stock</th></tr>`;

  variantes.forEach((v,i)=>{
    html+=`
    <tr>
      <td><input type="radio" name="prodSelect" value="${i}"></td>
      <td>${v.talla}</td>
      <td>${v.color}</td>
      <td>${v.stock}</td>
    </tr>`;
  });

  html+=`</table>

  <div style="display:flex;justify-content:space-between;">
    <button onclick="inicio()">⬅ Volver</button>
    <button style="background:#007bff;" onclick="agregarCarrito('${id}')">🛒 Agregar</button>
  </div>`;

  productos.innerHTML=html;
}

// CARRITO
function agregarCarrito(id){

  const radios=document.getElementsByName("prodSelect");
  let index=-1;

  radios.forEach((r,i)=>{if(r.checked) index=i;});

  if(index===-1){
    mostrarToast("Selecciona producto");
    return;
  }

  const item=inventario.filter(p=>p.id==id)[index];

  if(item.stock<=0){
    mostrarToast("Sin stock");
    return;
  }

  carrito.push(item);

  mostrarToast(item.producto+" agregado");
}

function verCarrito(){

  if(carrito.length===0){
    mostrarToast("Carrito vacío");
    return;
  }

  let html="<h2>🛒 Carrito</h2><table>";

  carrito.forEach((c,i)=>{
    html+=`
    <tr>
      <td>${c.producto}</td>
      <td>${c.talla}</td>
      <td><button onclick="eliminarItem(${i})">❌</button></td>
    </tr>`;
  });

  html+="</table>";

  productos.innerHTML=html;
}

function eliminarItem(i){
  const n=carrito[i].producto;
  carrito.splice(i,1);

  if(carrito.length===0){
    mostrarToast("Tu carrito se vació");
    inicio();
  } else {
    mostrarToast(n+" eliminado");
    verCarrito();
  }
}

// PANEL
function abrirPanel(){
  menu.style.display="none";
  panel.style.display="block";
}

function abrirFormulario(){
  window.open("https://docs.google.com/forms/d/e/1FAIpQLSfkDXdS7HH4ud4ephIeo0qMyiXqiNXLjs_gpmZF7fDqBoE73A/viewform");
}

function verVentas(){
  window.open("https://docs.google.com/spreadsheets/d/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE");
}

</script>

</body>
</html>
