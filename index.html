<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA A&T KAMIARA</title>
    <link rel="stylesheet" href="style.css">
    <!-- Librerías para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="toast">¡Añadido al carrito!</div>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>BIENVENIDO</h2>
    <p>A&T KAMIARA S.A.C.</p>
    <input id="u" placeholder="Usuario">
    <input id="p" type="password" placeholder="Contraseña">
    <button onclick="login()">INGRESAR</button>
    <p id="err" style="color:red; font-size:12px; margin-top:10px;"></p>
  </div>
</div>

<!-- APLICACIÓN -->
<div id="app" style="display:none;">
    <div id="v-inicio">
        <div id="portada">
            <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG">
        </div>
        <div class="titulo-app">A&T KAMIARA</div>
        <div class="header-actions">
            <button onclick="verCarrito()">🛒 Carrito (<span id="count">0</span>)</button>
            <button id="adminBtn" onclick="abrirAdmin()" style="display:none;">⚙️ Admin</button>
        </div>
        <div class="grid-menu" id="menu-cats"></div>
    </div>

    <div id="v-productos" style="display:none;">
        <div class="titulo-app" id="cat-nombre">PRODUCTOS</div>
        <div class="scroll-container" id="lista-prods"></div>
    </div>

    <div id="v-detalle" style="display:none; padding:15px;">
        <div id="detalle-content"></div>
    </div>

    <div id="v-carrito" style="display:none; padding:15px;">
        <h2 class="titulo-app">MI CARRITO</h2>
        <div id="cart-list"></div>
        <div id="cart-total" class="total-box"></div>
    </div>

    <div id="v-voucher" style="display:none; padding:15px;">
        <div id="voucher-legal"></div>
        <div class="ws-box">
            <input type="tel" id="ws-phone" placeholder="Número de WhatsApp (ej: 987654321)">
        </div>
    </div>

    <!-- NAVEGACIÓN (3 COLUMNAS) -->
    <div class="footer-nav" id="controles" style="display:none;">
        <button class="btn-nav-izq" id="btn-back">Volver</button>
        <div></div> <!-- Espacio central vacío -->
        <button class="btn-nav-der" id="btn-next">Acción</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
