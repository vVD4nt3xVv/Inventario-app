<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&T KAMIARA - Estructura</title>
    <!-- Aquí conectamos el CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Contenedor principal donde armaremos el carrito -->
    <div id="seccion-carrito">
        <h2>Tu Pedido</h2>

        <div id="lista-productos">
            <!-- Aquí irán los productos luego -->
            <p style="color: #666;">Cargando productos...</p>
        </div>

        <div class="resumen-pago">
            <div class="fila">
                <span>Subtotal:</span>
                <span id="subtotal">S/ 0.00</span>
            </div>

            <!-- EL CUADRO DE DESCUENTO (Solo diseño) -->
            <div class="caja-descuento">
                <span>Descuento (S/):</span>
                <div class="grupo-input">
                    <input type="number" id="input-descuento" placeholder="0.00">
                    <button type="button">APLICAR</button>
                </div>
            </div>

            <div class="fila total">
                <span>TOTAL:</span>
                <span id="total-final">S/ 0.00</span>
            </div>

            <button class="btn-confirmar">CONFIRMAR PEDIDO</button>
        </div>
    </div>

    <!-- Aquí conectamos el JS -->
    <script src="app.js"></script>
</body>
</html>
