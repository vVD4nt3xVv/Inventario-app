<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A&T KAMIARA</title>

<style>
body {background:#0b0b0b;color:white;font-family:Arial;margin:0;}

#portada {text-align:center;}
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {font-size:22px;margin-top:10px;}
.sub {color:gray;}

#login {text-align:center;padding:20px;}
#userInfo {text-align:center;margin-top:10px;color:lime;}

#menu {display:flex;flex-wrap:wrap;justify-content:center;}
.menu-card {
  width:40%;margin:10px;padding:10px;border-radius:15px;
  background:#111;text-align:center;
}

#productos {display:none;flex-wrap:wrap;justify-content:center;}
.card {
  width:45%;margin:10px;padding:10px;border-radius:15px;background:#111;
}
.card img {width:100%;border-radius:10px;}

button {
  width:100%;margin-top:5px;padding:8px;border:none;
  border-radius:10px;background:red;color:white;
}

#volver {display:none;padding:10px;background:#222;text-align:center;}
#panel, #dashboard {display:none;padding:20px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h3>Ingresar usuario</h3>
  <input id="usuario" placeholder="Nombre">
  <button onclick="guardarUsuario()">Entrar</button>
</div>

<div id="userInfo"></div>

<!-- PANEL BTN -->
<div id="panelBtn" style="display:none;">
  <button onclick="abrirPanel()">⚙️ PANEL ADMIN</button>
</div>

<!-- PORTADA -->
<div id="portada">
  <img src="https://via.placeholder.com/800x200">
  <div class="titulo">A&T KAMIARA S.A.C.</div>
  <div class="sub">Control de Inventario</div>
</div>

<!-- MENU -->
<div id="menu">
  <div class="menu-card" onclick="abrir('INVIERNO')">❄️ INVIERNO</div>
  <div class="menu-card" onclick="abrir('VERANO')">☀️ VERANO</div>
  <div class="menu-card" onclick="abrir('TECNOLOGIA')">💻 TECNOLOGÍA</div>
  <div class="menu-card" onclick="abrir('OTONO')">🍂 OTOÑO</div>
  <div class="menu-card" onclick="abrir('NAVIDAD')">🎄 NAVIDAD</div>
  <div class="menu-card" onclick="abrir('JUGUETES')">🧸 JUGUETES</div>
  <div class="menu-card" onclick="abrir('OTROS')">📦 OTROS</div>
</div>

<div id="volver" onclick="inicio()">⬅ Volver</div>
<div id="productos"></div>

<!-- PANEL -->
<div id="panel">
  <h2>Panel Admin</h2>
  <button onclick="abrirFormulario()">➕ Agregar Producto</button>
  <button onclick="verVentas()">📊 Ver Ventas</button>
  <button onclick="abrirDashboard()">📊 Dashboard</button>
  <button onclick="inicio()">⬅ Volver</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <h2>📊 Dashboard</h2>

  <p id="totalVentas"></p>
  <p id="ganancias"></p>

  <h3>🏆 Top Productos</h3>
  <ul id="topProductos"></ul>

  <h3>📅 Ventas por Día</h3>
  <canvas id="graficoDias" height="200"></canvas>

  <h3>⚠️ Stock Bajo</h3>
  <ul id="alertas"></ul>

  <button onclick="inicio()">⬅ Volver</button>
</div>

<script>
// CONFIG
const urlInv = "https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";
const urlVentas = "https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/VENTAS";

const FORM = "https://docs.google.com/forms/d/e/1FAIpQLSeoXDQp-aMlsrDCrq1r42QybYUgL-hdi1PiIWpRgnTc2A0STg/viewform";

const ENTRY_PRODUCTO = "entry.1002750291";
const ENTRY_TIPO = "entry.112461346";
const ENTRY_CANTIDAD = "entry.838577118";
const ENTRY_VENDEDOR = "entry.618694440";

const admins = ["richar","admin"];

const FORM_ADMIN = "https://docs.google.com/forms/d/e/1FAIpQLSfkDXdS7HH4ud4ephIeo0qMyiXqiNXLjs_gpmZF7fDqBoE73A/viewform";
const SHEETS_VENTAS = "https://docs.google.com/spreadsheets/d/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/edit#gid=0";

let inventario = [];

// LOGIN
function guardarUsuario(){
  const user = document.getElementById("usuario").value;
  if(user){
    localStorage.setItem("usuario", user);
    location.reload();
  }
}

window.onload = ()=>{
  const user = localStorage.getItem("usuario");

  if(user){
    document.getElementById("login").style.display="none";

    const esAdmin = admins.includes(user.toLowerCase());

    document.getElementById("userInfo").innerText =
      "Usuario: " + user + (esAdmin ? " (ADMIN)" : " (VENDEDOR)");

    if(esAdmin){
      document.getElementById("panelBtn").style.display="block";
    }
  }
};

// CARGAR INVENTARIO
fetch(urlInv)
.then(r=>r.json())
.then(d=>{
  inventario = d.map(p=>{
    let o={};
    Object.keys(p).forEach(k=>{
      o[k.trim().toLowerCase()] = p[k];
    });
    return o;
  });
});

// CATEGORÍAS (MAYÚSCULAS)
function abrir(cat){
  document.getElementById("menu").style.display="none";
  document.getElementById("productos").style.display="flex";
  document.getElementById("volver").style.display="block";

  let f = inventario.filter(p=>{
    const categoria = (p.categoria || "").toString().toUpperCase();
    return categoria === cat.toUpperCase();
  });

  render(f);
}

function inicio(){
  document.getElementById("menu").style.display="flex";
  document.getElementById("productos").style.display="none";
  document.getElementById("panel").style.display="none";
  document.getElementById("dashboard").style.display="none";
  document.getElementById("volver").style.display="none";
}

// PRODUCTOS
function render(lista){
  let html="";

  lista.forEach(p=>{
    html+=`
      <div class="card">
        <img src="${p.imagen || ''}">
        <h3>${p.producto}</h3>
        <p>📦 ${p.stock}</p>

        <p>Unidad: S/ ${p.unidad}</p>
        <p>Docena: S/ ${p.docena}</p>
        <p>Cajón: S/ ${p.cajon}</p>

        <button onclick="vender('${p.producto}','UNIDAD')">Unidad</button>
        <button onclick="vender('${p.producto}','DOCENA')">Docena</button>
        <button onclick="vender('${p.producto}','CAJON')">Cajón</button>
      </div>
    `;
  });

  document.getElementById("productos").innerHTML = html;
}

// VENDER
function vender(prod,tipo){
  const vendedor = localStorage.getItem("usuario") || "SinNombre";

  const link = FORM + "?" +
    ENTRY_PRODUCTO + "=" + encodeURIComponent(prod) +
    "&" + ENTRY_TIPO + "=" + tipo +
    "&" + ENTRY_CANTIDAD + "=1" +
    "&" + ENTRY_VENDEDOR + "=" + encodeURIComponent(vendedor);

  window.open(link,"_blank");
}

// PANEL
function abrirPanel(){
  document.getElementById("menu").style.display="none";
  document.getElementById("panel").style.display="block";
}

function abrirFormulario(){
  window.open(FORM_ADMIN,"_blank");
}

function verVentas(){
  window.open(SHEETS_VENTAS,"_blank");
}

// DASHBOARD
function abrirDashboard(){
  document.getElementById("panel").style.display="none";
  document.getElementById("dashboard").style.display="block";
  cargarDashboard();
}

function cargarDashboard(){
  fetch(urlVentas)
  .then(r=>r.json())
  .then(ventas=>{
    let total=0, dinero=0, productos={}, dias={};

    ventas.forEach(v=>{
      let prod=v.Producto?.toLowerCase();
      let tipo=v.Tipo?.toLowerCase();
      let cant=Number(v.Cantidad)||0;

      total+=cant;

      let item = inventario.find(i=>i.producto.toLowerCase()===prod);
      let precio=0;

      if(item){
        if(tipo==="unidad") precio=item.unidad;
        if(tipo==="docena") precio=item.docena;
        if(tipo==="cajon") precio=item.cajon;
      }

      dinero+=precio*cant;

      productos[prod]=(productos[prod]||0)+cant;

      let dia=(v.Fecha||"").split(" ")[0];
      dias[dia]=(dias[dia]||0)+cant;
    });

    document.getElementById("totalVentas").innerText="Total: "+total;
    document.getElementById("ganancias").innerText="Ganancias: S/ "+dinero;

    mostrarTop(productos);
    graficoDias(dias);
    alertasStock();
  });
}

function mostrarTop(p){
  let ul=document.getElementById("topProductos");
  ul.innerHTML="";
  Object.entries(p).sort((a,b)=>b[1]-a[1]).slice(0,5)
  .forEach(x=>{
    let li=document.createElement("li");
    li.innerText=x[0]+" - "+x[1];
    ul.appendChild(li);
  });
}

function graficoDias(d){
  let c=document.getElementById("graficoDias");
  let ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  let dias=Object.keys(d), vals=Object.values(d);
  let max=Math.max(...vals,1);
  let w=c.width/dias.length;

  vals.forEach((v,i)=>{
    let h=(v/max)*150;
    ctx.fillStyle="orange";
    ctx.fillRect(i*w,200-h,w-10,h);
    ctx.fillStyle="white";
    ctx.fillText(dias[i], i*w,190);
  });
}

function alertasStock(){
  let ul=document.getElementById("alertas");
  ul.innerHTML="";

  inventario.forEach(p=>{
    if(Number(p.stock)<=5){
      let li=document.createElement("li");
      li.innerText=p.producto+" (Stock: "+p.stock+")";
      ul.appendChild(li);
    }
  });
}
</script>

</body>
</html>
