<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario" required minlength="1" maxlength="20">
    <input id="password" type="password" placeholder="Contrasena" required minlength="1" maxlength="50">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="userInfo">
  <div class="bienvenido-row">BIENVENIDO</div>
  <div class="user-row">
    <div class="user-name" id="user-name"></div>
    <div class="user-cell-row">CELL: <span class="cell-number" id="user-cell"></span></div>
  </div>
  <div class="top-buttons">
    <div class="top-button-left"><button class="btn-salir" onclick="cerrarSesion()">Salir</button></div>
    <div class="top-button-center"><button class="btn-admin" id="panelBtn" onclick="abrirPanel()">Panel</button></div>
    <div class="top-button-right"><button class="btn-cart" onclick="verCarrito()">🛒 Carrito (<span id="count">0</span>)</button></div>
  </div>
</div>

<main id="main-content">
<div id="portada">
  <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG">
  <div class="titulo">CONTROL DE INVENTARIO</div>
  <div class="sub">-----------------------------------------------------------------------------------</div>
</div>

<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')"><img src="https://lh3.googleusercontent.com/d/1ndTNY35U3vt6Pu5dFtgcLpNS9DqmMemK"><p>INVIERNO</p></div>
  <div class="menu-card" onclick="abrir('VERANO')"><img src="https://lh3.googleusercontent.com/d/1-SOYaQM1NdW1UrNFCdLjuzb2l6eIvNOx"><p>VERANO</p></div>
  <div class="menu-card" onclick="abrir('TECNOLOGIA')"><img src="https://lh3.googleusercontent.com/d/1EEwUFXk3iC6QvMtb29gh3ySLuQRK_aPq"><p>TECNOLOGIA</p></div>
  <div class="menu-card" onclick="abrir('NAVIDEÑO')"><img src="https://lh3.googleusercontent.com/d/1HnwTLL0kiuRe7AC_PusCq5UNvKDIlN6p"><p>NAVIDEÑO</p></div>
</div>

<div id="productos"></div>

<div id="detalle-view" style="display:none; padding:10px;">
  <div id="detalle-content"></div>
</div>

<div id="carrito-view" style="display:none; padding:10px;">
  <h2>Carrito</h2>
  <div id="cart-table"></div>
  <div class="cart-bottom">
      <button class="btn-back" onclick="inicio()">← Volver</button>
      <button class="btn-proforma" onclick="pagar('proforma')">Proforma</button>
      <button class="btn-buy" onclick="pagar('venta')">Comprar</button>
  </div>
</div>

<div id="voucher-view" style="display:none; padding:10px;">
  <div id="voucher-header"></div>
  <div id="voucher-body"></div>
  <div class="voucher-footer">
      <button class="btn-back" onclick="volverCarrito()">← Volver</button>
      <div></div>
      <button class="btn-confirm" onclick="confirmarOperacion()">Descargar PDF</button>
  </div>
</div>

<div id="whatsapp-view" style="display:none; padding:10px;">
  <div class="whatsapp-container">
    <h2>📱 Enviar por WhatsApp</h2>
    <div class="whatsapp-content">
      <div id="voucher-preview" style="background:#fff; color:#111; padding:15px; border-radius:10px; margin-bottom:15px; max-height:300px; overflow-y:auto;"></div>
      
      <div class="form-group">
        <label>Número del cliente:</label>
        <input id="voucher-phone" type="tel" placeholder="Ej: 987654321 o +51987654321" value="">
      </div>
      
      <div class="button-group">
        <button class="btn-back" onclick="volverVoucher()">← Volver</button>
        <button class="btn-send-whatsapp" onclick="enviarWhatsappVoucher()">📨 Enviar por WhatsApp</button>
      </div>
    </div>
  </div>
</div>

<div id="panel">
  <h2>Panel Admin</h2>
  <button onclick="abrirFormulario()">➕ Agregar Producto</button>
  <button onclick="verVentas()">📊 Ver Ventas</button>
  <button onclick="inicio()">⬅ Volver</button>
</div>
</main>

<footer id="footer-nav">
    <button id="btn-back">← Volver</button>
    <div></div>
    <button id="btn-next">Acción</button>
</footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="app.js"></script>

</body>
</html>
