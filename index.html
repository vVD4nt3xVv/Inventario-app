<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
  font-size:15px;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.login-box input, .login-box button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  font-size:14px;
}

.login-box input {background:#222;color:white;}
.login-box button {background:red;color:white;}

#errorLogin {color:#ff4d4d;}

/* HEADER */
#userInfo {
  text-align:center;
  margin-top:10px;
  font-weight:bold;
  font-size:16px;
}

/* BOTONES */
.top-buttons {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.btn-salir, .btn-admin {
  padding:8px 18px;
  border-radius:8px;
  font-size:13px;
}

.btn-salir {background:red;}
.btn-admin {background:#007bff;display:none;}

/* PORTADA */
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {text-align:center;font-size:24px;}
.sub {text-align:center;color:gray;font-size:14px;}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}
.menu-card:hover {transform:scale(1.03);}

.menu-card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.menu-card p {
  font-size:16px;
}

/* PRODUCTOS */
#productos {
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}
.card:hover {transform:scale(1.03);}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.card h3 {font-size:16px;}
.card p {font-size:14px;}

/* DETALLE */
.detalle-img {
  width:100%;
  border-radius:15px;
}

/* FILA */
.fila-opciones {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  gap:10px;
  text-align:center;
  font-size:14px;
}

.fila-opciones div {flex:1;}

/* COLORES */
.stock {color:#00ff88;font-weight:bold;}
.total {color:#00aaff;font-weight:bold;}

/* SELECT */
select {
  background:#222;
  color:white;
  border:none;
  border-radius:8px;
  padding:6px;
}

/* TABLA */
table {
  width:100%;
  margin-top:10px;
  background:#111;
  border-radius:10px;
  text-align:center;
}

th,td {padding:8px;font-size:14px;}

/* BOTONES */
button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  font-size:15px;
}

h2 {text-align:center;}

#panel {display:none;padding:20px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-admin" id="panelBtn" onclick="abrirPanel()">Panel</button>
</div>

<div id="portada">
  <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG">
  <div class="titulo">CONTROL DE INVENTARIO</div>
  <div class="sub">-----------------------------------------------------------------------------------</div>
</div>

<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')"><img src="https://lh3.googleusercontent.com/d/1ndTNY35U3vt6Pu5dFtgcLpNS9DqmMemK"><p>INVIERNO</p></div>
  <div class="menu-card" onclick="abrir('VERANO')"><img src="https://lh3.googleusercontent.com/d/1-SOYaQM1NdW1UrNFCdLjuzb2l6eIvNOx"><p>VERANO</p></div>
  <div class="menu-card" onclick="abrir('TECNOLOGIA')"><img src="https://lh3.googleusercontent.com/d/1EEwUFXk3iC6QvMtb29gh3ySLuQRK_aPq"><p>TECNOLOGIA</p></div>
  <div class="menu-card" onclick="abrir('NAVIDEÑO')"><img src="https://lh3.googleusercontent.com/d/1HnwTLL0kiuRe7AC_PusCq5UNvKDIlN6p"><p>NAVIDEÑO</p></div>
</div>

<div id="productos"></div>

<div id="panel">
  <h2>Panel Admin</h2>
  <button onclick="abrirFormulario()">➕ Agregar Producto</button>
  <button onclick="verVentas()">📊 Ver Ventas</button>
  <button onclick="inicio()">⬅ Volver</button>
</div>

</div>

<script>

// USUARIOS
const usuariosSistema = {
  luis:"123",
  katy:"123",
  katherine:"123",
  richard:"123",
  dante:"admin123"
};
const admins = ["dante"];

// LOGIN
function guardarUsuario(){
  const user=usuario.value.toLowerCase();
  const pass=password.value;

  if(!usuariosSistema[user]) return errorLogin.innerText="Usuario no registrado";
  if(usuariosSistema[user]!==pass) return errorLogin.innerText="Contraseña incorrecta";

  localStorage.setItem("usuario",user);
  location.reload();
}

function cerrarSesion(){
  localStorage.removeItem("usuario");
  location.reload();
}

// UI
window.onload=()=>{
  const user=localStorage.getItem("usuario");

  login.style.display=user?"none":"flex";
  app.style.display=user?"block":"none";

  if(user){
    userInfo.innerHTML=`USUARIO: ${user.toUpperCase()}`;
    if(admins.includes(user)) panelBtn.style.display="inline-block";
  }
};

// INVENTARIO
const urlInv="https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";
let inventario=[];
let carrito=[];

fetch(urlInv)
.then(r=>r.json())
.then(d=>{
  inventario=d.map(p=>{
    let o={};
    Object.keys(p).forEach(k=>o[k.toLowerCase().trim()]=p[k]);

    return {
      id:o.id,
      producto:o.producto,
      categoria:(o.categoria||"").toUpperCase(),
      talla:o.talla,
      color:o.color,
      stock:parseInt(o.stock)||0,
      unidad:parseFloat(o["p.unidad"])||0,
      docena:parseFloat(o["p.docena"])||0,
      imagen:o.imagen
    };
  });
});

// MENU
function abrir(cat){
  if(inventario.length===0){ alert("Cargando..."); return; }

  menu.style.display="none";
  productos.style.display="grid";

  const filtrados=inventario.filter(p=>p.categoria===cat && p.stock>0);

  const unicos={};
  filtrados.forEach(p=>{ if(!unicos[p.id]) unicos[p.id]=p; });

  render(Object.values(unicos));

  productos.innerHTML+=`<button onclick="inicio()">⬅ Volver</button>`;
}

function inicio(){
  menu.style.display="grid";
  productos.style.display="none";
  panel.style.display="none";
}

// LISTA
function render(lista){
  let html="";
  lista.forEach(p=>{
    html+=`
    <div class="card" onclick="verProducto('${p.id}')">
      <img src="${p.imagen}">
      <h3>${p.producto}</h3>
      <p style="color:lime;">S/ ${p.unidad}</p>
    </div>`;
  });
  productos.innerHTML=html;
}

// DETALLE
function verProducto(id){

  const variantes=inventario.filter(p=>p.id==id);
  const p=variantes[0];

  const tallas=[...new Set(variantes.map(v=>v.talla).filter(t=>t))];
  const stockTotal=variantes.reduce((a,b)=>a+b.stock,0);

  productos.innerHTML=`
    <div>
      <img class="detalle-img" src="${p.imagen}">
      <h2>${p.producto}</h2>

      <div class="fila-opciones">
        <div>
          🧵 TALLAS
          <select id="tallaSelect" onchange="cambiarTalla('${id}')">
            ${tallas.map(t=>`<option value="${t}">${t}</option>`).join("")}
            <option value="TODAS">TODAS</option>
          </select>
        </div>

        <div>📦 STOCK <span class="stock" id="stockTalla">0</span></div>
        <div>📊 TOTAL <span class="total">${stockTotal}</span></div>
      </div>

      <table id="tablaDetalle"></table>

      <button onclick="agregarCarrito('${id}')">🛒 Agregar al carrito</button>
      <button onclick="verCarrito()">🧾 Ver carrito</button>
      <button onclick="volverLista('${p.categoria}')">⬅ Volver</button>
    </div>
  `;

  cambiarTalla(id);
}

// FILTRO
function cambiarTalla(id){
  const talla=document.getElementById("tallaSelect").value;

  let filtrados = talla==="TODAS"
    ? inventario.filter(p=>p.id==id)
    : inventario.filter(p=>p.id==id && p.talla==talla);

  const total=filtrados.reduce((a,b)=>a+b.stock,0);
  document.getElementById("stockTalla").innerText=total;

  let filas=`<tr>
      <th>TALLA</th><th>COLOR</th><th>STOCK</th><th>P.UNIDAD</th><th>P.DOCENA</th>
    </tr>`;

  filtrados.forEach(v=>{
    filas+=`
      <tr>
        <td>${v.talla}</td>
        <td>${v.color}</td>
        <td>${v.stock}</td>
        <td>S/ ${v.unidad}</td>
        <td>S/ ${v.docena}</td>
      </tr>`;
  });

  document.getElementById("tablaDetalle").innerHTML=filas;
}

// CARRITO
function agregarCarrito(id){
  const talla=document.getElementById("tallaSelect").value;

  if(talla==="TODAS"){ alert("Selecciona talla"); return; }

  const item=inventario.find(p=>p.id==id && p.talla==talla);

  if(!item || item.stock<=0){ alert("Sin stock"); return; }

  carrito.push({
    id:item.id,
    producto:item.producto,
    talla:item.talla,
    color:item.color,
    precio:item.unidad,
    cantidad:1
  });

  alert("Agregado al carrito");
}

function verCarrito(){

  if(carrito.length===0){ alert("Vacío"); return; }

  let total=0;

  let html=`<h2>🛒 Carrito</h2><table>
  <tr><th>Prod</th><th>Talla</th><th>Cant</th><th>Precio</th></tr>`;

  carrito.forEach(c=>{
    total+=c.precio*c.cantidad;
    html+=`<tr>
      <td>${c.producto}</td>
      <td>${c.talla}</td>
      <td>${c.cantidad}</td>
      <td>S/ ${c.precio}</td>
    </tr>`;
  });

  html+=`</table>
  <h3>Total: S/ ${total}</h3>
  <button onclick="finalizarVenta()">✅ Vender</button>
  <button onclick="vaciarCarrito()">🗑 Vaciar</button>
  <button onclick="inicio()">⬅ Volver</button>`;

  productos.innerHTML=html;
}

function finalizarVenta(){

  carrito.forEach(item=>{
    const prod=inventario.find(p=>p.id==item.id && p.talla==item.talla);
    if(prod){
      prod.stock-=item.cantidad;
      if(prod.stock<0) prod.stock=0;
    }
  });

  alert("Venta realizada");
  carrito=[];
  inicio();
}

function vaciarCarrito(){
  carrito=[];
  alert("Carrito vacío");
  inicio();
}

// VOLVER
function volverLista(cat){ abrir(cat); }

// PANEL
function abrirPanel(){
  menu.style.display="none";
  panel.style.display="block";
}

function abrirFormulario(){
  window.open("https://docs.google.com/forms/d/e/1FAIpQLSfkDXdS7HH4ud4ephIeo0qMyiXqiNXLjs_gpmZF7fDqBoE73A/viewform");
}

function verVentas(){
  window.open("https://docs.google.com/spreadsheets/d/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE");
}

</script>

</body>
</html>
