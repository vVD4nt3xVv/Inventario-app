<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inventario</title>

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial;
  margin: 0;
}

/* PORTADA */
#menu {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 50px;
}

.menu-card {
  width: 80%;
  padding: 20px;
  margin: 10px;
  border-radius: 15px;
  background: #111;
  text-align: center;
  font-size: 20px;
}

/* PRODUCTOS */
#productos {
  display: none;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 45%;
  margin: 10px;
  padding: 10px;
  border-radius: 15px;
  background: #111;
}

img {
  width: 100%;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: red;
  color: white;
}
</style>
</head>

<body>

<!-- PORTADA -->
<div id="menu">
  <div class="menu-card" onclick="abrirCategoria('invierno')">❄️ Invierno</div>
  <div class="menu-card" onclick="abrirCategoria('verano')">☀️ Verano</div>
  <div class="menu-card" onclick="abrirCategoria('tecnologia')">💻 Tecnología</div>
</div>

<!-- PRODUCTOS -->
<div id="productos"></div>

<script>
const url = "https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";

let productos = [];

// cargar datos
fetch(url)
.then(r => r.json())
.then(data => {

  productos = data.map(p => {
    let obj = {};
    Object.keys(p).forEach(k=>{
      obj[k.trim().toLowerCase()] = p[k];
    });
    return obj;
  });

});

// abrir categoría
function abrirCategoria(cat){

  document.getElementById("menu").style.display = "none";
  document.getElementById("productos").style.display = "flex";

  let filtrados = productos.filter(p =>
    (p.categoria || "").toLowerCase().includes(cat)
  );

  render(filtrados);
}

// render productos
function render(lista){
  let html = "";

  lista.forEach(p => {

    const nombre = p.producto || "Producto";
    const precio = p.precio || 0;
    const stock = p.stock || 0;
    const imagen = p.imagen || "https://via.placeholder.com/150";

    html += `
      <div class="card">
        <img src="${imagen}">
        <h3>${nombre}</h3>
        <p>💲 S/ ${precio}</p>
        <p style="color:${stock <= 5 ? 'red' : 'lime'};">
          📦 ${stock}
        </p>
      </div>
    `;
  });

  document.getElementById("productos").innerHTML = html;
}
</script>

</body>
</html>
