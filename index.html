<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&T KAMIARA - Control de Inventario</title>
    <!-- Enlace al archivo de estilos -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container"></div>

    <!-- LOGIN -->
    <div id="login">
        <div class="login-box">
            <h3>Bienvenido</h3>
            <input id="usuario" placeholder="Usuario">
            <input id="password" type="password" placeholder="Contraseña">
            <button onclick="guardarUsuario()">Entrar</button>
            <p id="errorLogin"></p>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app" style="display:none;">
        <div class="header-app">
            <div id="userInfo"></div>
            <button class="btn-carrito-flotante" onclick="mostrarCarrito()">
                🛒 Carrito (<span id="cart-count">0</span>)
            </button>
        </div>

        <div class="top-buttons">
            <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
            <button class="btn-admin" id="panelBtn" onclick="abrirPanel()">Panel</button>
        </div>

        <div id="portada">
            <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG" alt="Portada">
            <div class="titulo">CONTROL DE INVENTARIO</div>
            <div class="sub">---------------------------------------------------------</div>
        </div>

        <!-- Menú de Categorías -->
        <div id="menu" class="grid-menu">
            <div class="menu-card" onclick="abrir('INVIERNO')">
                <img src="https://lh3.googleusercontent.com/d/1ndTNY35U3vt6Pu5dFtgcLpNS9DqmMemK">
                <p>INVIERNO</p>
            </div>
            <div class="menu-card" onclick="abrir('VERANO')">
                <img src="https://lh3.googleusercontent.com/d/1-SOYaQM1NdW1UrNFCdLjuzb2l6eIvNOx">
                <p>VERANO</p>
            </div>
            <div class="menu-card" onclick="abrir('TECNOLOGIA')">
                <img src="https://lh3.googleusercontent.com/d/1EEwUFXk3iC6QvMtb29gh3ySLuQRK_aPq">
                <p>TECNOLOGIA</p>
            </div>
            <div class="menu-card" onclick="abrir('NAVIDEÑO')">
                <img src="https://lh3.googleusercontent.com/d/1HnwTLL0kiuRe7AC_PusCq5UNvKDIlN6p">
                <p>NAVIDEÑO</p>
            </div>
        </div>

        <div id="productos"></div>

        <!-- SECCIÓN CARRITO ESTILO FALABELLA -->
        <div id="seccion-carrito">
            <h2>Tu Carrito</h2>
            <div class="carrito-header">
                <span>PRODUCTO</span>
                <span class="txt-center">CANT.</span>
                <span class="txt-center">UNIT.</span>
                <span class="txt-right">TOTAL</span>
            </div>
            
            <div id="lista-carrito"></div>
            
            <div class="cart-resumen">
                <div class="total-fila txt-grey">
                    <span>Subtotal:</span>
                    <span id="subtotalCarrito">S/ 0.00</span>
                </div>

                <!-- Caja de Descuento Alineada -->
                <div class="caja-descuento">
                    <span>Descuento (S/):</span>
                    <div class="caja-descuento-inputs">
                        <input type="number" id="inputDescuento" placeholder="0.00" min="0" step="0.50">
                        <button onclick="aplicarDescuento()">Aplicar</button>
                    </div>
                </div>

                <div class="total-fila total-final">
                    <span>TOTAL A PAGAR:</span>
                    <span id="totalFinalCarrito">S/ 0.00</span>
                </div>

                <button class="btn-confirmar" onclick="alert('Pedido confirmado')">Confirmar Pedido</button>
                <button class="btn-volver" onclick="inicio()">⬅ Seguir Comprando</button>
            </div>
        </div>

        <div id="panel">
            <h2>Panel Admin</h2>
            <button onclick="abrirFormulario()">➕ Agregar Producto</button>
            <button onclick="verVentas()">📊 Ver Ventas</button>
            <button onclick="inicio()">⬅ Volver</button>
        </div>
    </div>

    <!-- Enlace al archivo de lógica -->
    <script src="script.js"></script>
</body>
</html>
