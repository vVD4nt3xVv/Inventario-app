<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
  font-size:15px;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.login-box input, .login-box button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
}

.login-box input {background:#222;color:white;}
.login-box button {background:red;color:white;}

#errorLogin {color:#ff4d4d;}

/* HEADER */
#userInfo {text-align:center;margin-top:10px;font-weight:bold;}

.top-buttons {
  display:flex;
  justify-content:space-between;
  margin:10px;
}

.btn-salir {background:red;}
.btn-carrito {background:#00c853;}
.btn-admin {background:#007bff;display:none;}

.top-buttons button {
  padding:8px 12px;
  border-radius:8px;
  border:none;
  color:white;
}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}
.menu-card:hover {transform:scale(1.03);}

.menu-card img {width:100%;height:120px;object-fit:cover;}

/* PRODUCTOS */
#productos {display:none; padding:10px;}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.card img {width:100%;height:140px;object-fit:cover;}

.detalle-img {width:100%;border-radius:15px;}

.fila-opciones {
  display:flex;
  justify-content:space-between;
  background:#111;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.stock {color:#00ff88;}
.total {color:#00aaff;}

table {
  width:100%;
  margin-top:10px;
  background:#111;
}

th,td {padding:8px;text-align:center;}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  color:white;
}

/* TOAST */
#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:10px 20px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}
#toast.show {opacity:1;}

</style>
</head>

<body>

<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-carrito" onclick="verCarrito()">🛒</button>
  <button class="btn-admin" id="panelBtn" onclick="abrirPanel()">Panel</button>
</div>

<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')"><p>INVIERNO</p></div>
  <div class="menu-card" onclick="abrir('VERANO')"><p>VERANO</p></div>
  <div class="menu-card" onclick="abrir('TECNOLOGIA')"><p>TECNOLOGIA</p></div>
  <div class="menu-card" onclick="abrir('NAVIDEÑO')"><p>NAVIDEÑO</p></div>
</div>

<div id="productos"></div>

<div id="panel">
  <button onclick="inicio()">⬅ Volver</button>
</div>

</div>

<div id="toast"></div>

<script>

// LOGIN
const usuariosSistema={dante:"admin123"};
const admins=["dante"];

function guardarUsuario(){
  const u=usuario.value;
  const p=password.value;

  if(usuariosSistema[u]!==p){
    errorLogin.innerText="Error";
    return;
  }

  localStorage.setItem("usuario",u);
  location.reload();
}

function cerrarSesion(){
  localStorage.removeItem("usuario");
  location.reload();
}

window.onload=()=>{
  const u=localStorage.getItem("usuario");
  login.style.display=u?"none":"flex";
  app.style.display=u?"block":"none";

  if(u){
    userInfo.innerText="USUARIO: "+u;
    if(admins.includes(u)) panelBtn.style.display="inline-block";
  }
};

// TOAST
function mostrarToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

// DATA
let inventario=[];
let carrito=[];

fetch("https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO")
.then(r=>r.json())
.then(d=>inventario=d);

// MENU
function abrir(cat){
  const lista=inventario.filter(p=>p.categoria===cat);

  let html="";
  lista.forEach(p=>{
    html+=`<div class="card" onclick="verProducto('${p.id}')">${p.producto}</div>`;
  });

  productos.style.display="block";
  menu.style.display="none";
  productos.innerHTML=html;
}

function inicio(){
  menu.style.display="grid";
  productos.style.display="none";
}

// DETALLE
function verProducto(id){

  const lista=inventario.filter(p=>p.id==id);

  let html=`
  <h2>${lista[0].producto}</h2>
  <table>
  <tr><th></th><th>Talla</th><th>Color</th><th>Stock</th></tr>`;

  lista.forEach((v,i)=>{
    html+=`
    <tr>
      <td><input type="radio" name="prodSelect" value="${i}"></td>
      <td>${v.talla}</td>
      <td>${v.color}</td>
      <td>${v.stock}</td>
    </tr>`;
  });

  html+=`</table>

  <div style="display:flex; justify-content:space-between;">
    <button onclick="inicio()">⬅ Volver</button>
    <button style="background:#007bff;" onclick="agregarCarrito('${id}')">Agregar</button>
  </div>`;

  productos.innerHTML=html;
}

// CARRITO
function agregarCarrito(id){

  const radios=document.getElementsByName("prodSelect");
  let index=-1;

  radios.forEach((r,i)=>{if(r.checked) index=i;});

  if(index===-1){
    mostrarToast("Selecciona producto");
    return;
  }

  const item=inventario.filter(p=>p.id==id)[index];

  carrito.push(item);

  mostrarToast(item.producto+" agregado");
}

function verCarrito(){

  if(carrito.length===0){
    mostrarToast("Carrito vacío");
    return;
  }

  let html="<h2>Carrito</h2><table>";

  carrito.forEach((c,i)=>{
    html+=`
    <tr>
      <td>${c.producto}</td>
      <td><button onclick="eliminarItem(${i})">❌</button></td>
    </tr>`;
  });

  html+="</table>";

  productos.innerHTML=html;
}

function eliminarItem(i){
  const n=carrito[i].producto;
  carrito.splice(i,1);

  if(carrito.length===0){
    mostrarToast("Tu carrito se vació");
    inicio();
  } else {
    mostrarToast(n+" eliminado");
    verCarrito();
  }
}

</script>

</body>
</html>
