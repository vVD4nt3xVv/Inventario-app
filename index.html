<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
  font-size:15px;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.login-box input, .login-box button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
}

.login-box input {background:#222;color:white;}
.login-box button {background:red;color:white;}

/* APP */
#userInfo {
  text-align:center;
  margin-top:10px;
  font-weight:bold;
}

.top-buttons {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.btn-salir {background:red;padding:8px;border-radius:8px;}
.btn-admin {background:#007bff;padding:8px;border-radius:8px;display:none;}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.menu-card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

/* PRODUCTOS */
#productos {
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

/* DETALLE */
.detalle-img {
  width:100%;
  border-radius:15px;
}

/* FILA */
.fila-opciones {
  display:flex;
  justify-content:space-between;
  background:#111;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
}

.stock {color:#00ff88;}
.total {color:#00aaff;}

/* TABLA */
table {
  width:100%;
  margin-top:10px;
  background:#111;
  border-radius:10px;
  text-align:center;
}

th,td {padding:8px;}

/* CARRITO */
#carrito {
  display:none;
  flex-direction:column;
  align-items:center;
  padding:15px;
}

.carrito-box {
  width:100%;
  background:#111;
  border-radius:15px;
  padding:12px;
}

.carrito-titulo {
  text-align:center;
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}

.carrito-item {
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  text-align:center;
  padding:8px;
  border-bottom:1px solid #333;
  font-size:13px;
}

.carrito-total {
  margin-top:10px;
  text-align:right;
  color:#00aaff;
  font-weight:bold;
}

.btn-descuento {
  background:green;
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3>LOGIN</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-admin" id="panelBtn">Panel</button>
</div>

<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')">INVIERNO</div>
  <div class="menu-card" onclick="abrir('VERANO')">VERANO</div>
</div>

<div id="productos"></div>

<!-- CARRITO -->
<div id="carrito"></div>

</div>

<script>

/* LOGIN */
const usuarios={luis:"123",dante:"admin123"};
const admins=["dante"];

function guardarUsuario(){
  const u=usuario.value.toLowerCase();
  const p=password.value;
  if(usuarios[u]!==p) return alert("error");
  localStorage.setItem("u",u);
  location.reload();
}

function cerrarSesion(){
  localStorage.removeItem("u");
  location.reload();
}

window.onload=()=>{
  const u=localStorage.getItem("u");
  login.style.display=u?"none":"flex";
  app.style.display=u?"block":"none";
  if(u) userInfo.innerText="USUARIO: "+u;
};

/* INVENTARIO */
let inventario=[];
fetch("https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO")
.then(r=>r.json())
.then(d=>inventario=d);

/* CARRITO */
let carrito=[];

function agregarCarrito(p){
  carrito.push({
    producto:p.producto,
    talla:p.talla,
    color:p.color,
    unidad:parseFloat(p.unidad),
    docena:parseFloat(p.docena),
    cantidad:1
  });
  renderCarrito();
}

function calcularPrecio(p){
  if(p.cantidad<12) return p.unidad*p.cantidad;
  const d=Math.floor(p.cantidad/12);
  const r=p.cantidad%12;
  return (d*p.docena)+(r*p.unidad);
}

function renderCarrito(){

  carrito.style.display="flex";

  let total=0;

  let html=`
  <div class="carrito-box">
    <div class="carrito-titulo">CARRITO</div>

    <div class="carrito-item">
      <div>Prod</div><div>Talla</div><div>Cant</div><div>Total</div>
    </div>
  `;

  carrito.forEach(p=>{
    const t=calcularPrecio(p);
    total+=t;

    html+=`
    <div class="carrito-item">
      <div>${p.producto}</div>
      <div>${p.talla}</div>
      <div>${p.cantidad}</div>
      <div>S/${t.toFixed(2)}</div>
    </div>`;
  });

  html+=`
  <button class="btn-descuento" onclick="descuento()">DESCUENTO</button>
  <div class="carrito-total">TOTAL: S/${total.toFixed(2)}</div>
  </div>`;

  document.getElementById("carrito").innerHTML=html;
}

function descuento(){
  carrito=carrito.map(p=>{
    p.unidad*=0.9;
    return p;
  });
  renderCarrito();
}

</script>

</body>
</html>
