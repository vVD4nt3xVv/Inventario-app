<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
  font-size:15px;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.login-box input, .login-box button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  font-size:14px;
}

.login-box input {background:#222;color:white;}
.login-box button {background:red;color:white;}

#errorLogin {color:#ff4d4d;}

/* HEADER */
#userInfo {
  text-align:center;
  margin-top:10px;
  font-weight:bold;
  font-size:16px;
}

/* BOTONES */
.top-buttons {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.btn-salir {background:red;padding:8px 18px;border-radius:8px;}
.btn-admin {background:#007bff;padding:8px 18px;border-radius:8px;display:none;}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.menu-card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

/* PRODUCTOS */
#productos {
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

/* DETALLE */
.detalle-img {
  width:100%;
  border-radius:15px;
}

.fila-opciones {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  gap:10px;
  font-size:14px;
}

.stock {color:#00ff88;}
.total {color:#00aaff;}

table {
  width:100%;
  margin-top:10px;
  background:#111;
  border-radius:10px;
  text-align:center;
}

th,td {padding:8px;font-size:14px;}

/* BOTONES */
button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  font-size:15px;
}

/* 🛒 CARRITO */
#carrito {
  display:none;
  padding:10px;
}

.carrito-box {
  background:#111;
  border-radius:15px;
  padding:12px;
}

.carrito-titulo {
  text-align:center;
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}

.carrito-item {
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr;
  text-align:center;
  font-size:13px;
  padding:6px;
  border-bottom:1px solid #333;
}

.carrito-total {
  margin-top:10px;
  text-align:right;
  font-weight:bold;
  color:#00aaff;
}

.btn-descuento {
  background:green;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-admin" id="panelBtn">Panel</button>
</div>

<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')">
    <img src="https://lh3.googleusercontent.com/d/1ndTNY35U3vt6Pu5dFtgcLpNS9DqmMemK">
    <p>INVIERNO</p>
  </div>
</div>

<div id="productos"></div>

<!-- 🛒 CARRITO -->
<div id="carrito"></div>

</div>

<script>

/* LOGIN */
const usuariosSistema = {
  luis:"123",
  katy:"123",
  katherine:"123",
  richard:"123",
  dante:"admin123"
};
const admins=["dante"];

function guardarUsuario(){
  const user=usuario.value.toLowerCase();
  const pass=password.value;

  if(!usuariosSistema[user]) return errorLogin.innerText="Usuario no registrado";
  if(usuariosSistema[user]!==pass) return errorLogin.innerText="Contraseña incorrecta";

  localStorage.setItem("usuario",user);
  location.reload();
}

function cerrarSesion(){
  localStorage.removeItem("usuario");
  location.reload();
}

window.onload=()=>{
  const user=localStorage.getItem("usuario");

  login.style.display=user?"none":"flex";
  app.style.display=user?"block":"none";

  if(user){
    userInfo.innerHTML="USUARIO: "+user.toUpperCase();
    if(admins.includes(user)) panelBtn.style.display="inline-block";
  }
};

/* INVENTARIO */
const urlInv="https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";
let inventario=[];

fetch(urlInv)
.then(r=>r.json())
.then(d=>{
  inventario=d.map(p=>{
    let o={};
    Object.keys(p).forEach(k=>o[k.toLowerCase().trim()]=p[k]);

    return {
      id:o.id,
      producto:o.producto,
      categoria:(o.categoria||"").toUpperCase(),
      talla:o.talla,
      color:o.color,
      stock:parseInt(o.stock)||0,
      unidad:o["p.unidad"],
      docena:o["p.docena"],
      imagen:o.imagen
    };
  });
});

/* MENU */
function abrir(cat){
  menu.style.display="none";
  productos.style.display="grid";

  const filtrados=inventario.filter(p=>p.categoria===cat && p.stock>0);

  const unicos={};
  filtrados.forEach(p=>{ if(!unicos[p.id]) unicos[p.id]=p; });

  render(Object.values(unicos));
}

/* LISTA */
function render(lista){
  let html="";
  lista.forEach(p=>{
    html+=`
    <div class="card" onclick="verProducto('${p.id}')">
      <h3>${p.producto}</h3>
      <p style="color:lime;">S/ ${p.unidad}</p>
    </div>`;
  });
  productos.innerHTML=html;
}

/* DETALLE */
function verProducto(id){

  const variantes=inventario.filter(p=>p.id==id);
  const p=variantes[0];

  const stockTotal=variantes.reduce((a,b)=>a+b.stock,0);

  productos.innerHTML=`
    <div>
      <img class="detalle-img" src="${p.imagen}">
      <h2>${p.producto}</h2>

      <div class="fila-opciones">
        <div>📦 STOCK <span class="stock">${stockTotal}</span></div>
        <div>💰 S/ ${p.unidad}</div>
      </div>

      <button onclick="agregarCarrito('${p.id}')">➕ Agregar carrito</button>

      <button onclick="inicio()">⬅ Volver</button>
    </div>
  `;
}

/* VOLVER */
function inicio(){
  menu.style.display="grid";
  productos.style.display="none";
  carrito.style.display="none";
}

/* 🛒 CARRITO */
let carritoData=[];

function agregarCarrito(id){

  const p=inventario.find(x=>x.id==id);
  if(!p) return;

  carritoData.push({
    producto:p.producto,
    talla:p.talla,
    color:p.color,
    unidad:parseFloat(p.unidad),
    docena:parseFloat(p.docena),
    cantidad:1
  });

  renderCarrito();
}

function calcular(p){
  if(p.cantidad<12) return p.unidad*p.cantidad;

  const d=Math.floor(p.cantidad/12);
  const r=p.cantidad%12;

  return (d*p.docena)+(r*p.unidad);
}

function renderCarrito(){

  carrito.style.display="block";

  let total=0;

  let html=`
  <div class="carrito-box">
    <div class="carrito-titulo">🛒 CARRITO</div>

    <div class="carrito-item">
      <div>Producto</div>
      <div>Talla</div>
      <div>Cant</div>
      <div>Total</div>
    </div>
  `;

  carritoData.forEach(p=>{
    const t=calcular(p);
    total+=t;

    html+=`
    <div class="carrito-item">
      <div>${p.producto}</div>
      <div>${p.talla}</div>
      <div>${p.cantidad}</div>
      <div>S/${t.toFixed(2)}</div>
    </div>`;
  });

  html+=`
    <button class="btn-descuento" onclick="descuento()">DESCUENTO</button>
    <div class="carrito-total">TOTAL: S/${total.toFixed(2)}</div>
  </div>`;

  carrito.innerHTML=html;
}

function descuento(){
  carritoData=carritoData.map(p=>{
    p.unidad*=0.9;
    return p;
  });
  renderCarrito();
}

</script>

</body>
</html>
