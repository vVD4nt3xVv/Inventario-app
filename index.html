<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A&T KAMIARA</title>

<style>
body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  margin:0;
}

/* PORTADA */
#portada {
  text-align:center;
}

#portada img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.titulo {
  font-size:22px;
  margin-top:10px;
}

.sub {
  color:gray;
}

/* CATEGORIAS */
#menu {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.menu-card {
  width:40%;
  margin:10px;
  padding:10px;
  border-radius:15px;
  background:#111;
  text-align:center;
}

.menu-card img {
  width:100%;
  border-radius:10px;
}

/* PRODUCTOS */
#productos {
  display:none;
  flex-wrap:wrap;
  justify-content:center;
}

.card {
  width:45%;
  margin:10px;
  padding:10px;
  border-radius:15px;
  background:#111;
}

.card img {
  width:100%;
  border-radius:10px;
}

button {
  width:100%;
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
}

/* VOLVER */
#volver {
  display:none;
  padding:10px;
  background:#222;
  text-align:center;
}
</style>
</head>

<body>

<!-- PORTADA -->
<div id="portada">
  <img src="https://via.placeholder.com/800x200">
  <div class="titulo">A&T KAMIARA S.A.C.</div>
  <div class="sub">Control de Inventario</div>
</div>

<!-- MENU -->
<div id="menu">
  <div class="menu-card" onclick="abrir('invierno')">
    <img src="https://via.placeholder.com/150">
    ❄️ Invierno
  </div>

  <div class="menu-card" onclick="abrir('verano')">
    <img src="https://via.placeholder.com/150">
    ☀️ Verano
  </div>

  <div class="menu-card" onclick="abrir('tecnologia')">
    <img src="https://via.placeholder.com/150">
    💻 Tecnología
  </div>
</div>

<div id="volver" onclick="inicio()">⬅ Volver</div>

<div id="productos"></div>

<script>
const url = "https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";

// 🔥 FORMULARIO (LUEGO LO CONFIGURAMOS)
const FORM = "https://docs.google.com/forms/d/e/TU_FORM_ID/viewform";
const ENTRY_PRODUCTO = "entry.111";
const ENTRY_CANTIDAD = "entry.222";

let data = [];

// cargar datos
fetch(url)
.then(r=>r.json())
.then(d=>{
  data = d.map(p=>{
    let o = {};
    Object.keys(p).forEach(k=>{
      o[k.trim().toLowerCase()] = p[k];
    });
    return o;
  });
});

// abrir categoria
function abrir(cat){
  document.getElementById("menu").style.display="none";
  document.getElementById("productos").style.display="flex";
  document.getElementById("volver").style.display="block";

  let f = data.filter(p=>
    (p.categoria||"").toLowerCase().includes(cat)
  );

  render(f);
}

// volver
function inicio(){
  document.getElementById("menu").style.display="flex";
  document.getElementById("productos").style.display="none";
  document.getElementById("volver").style.display="none";
}

// render
function render(lista){

  let html="";

  lista.forEach(p=>{

    const nombre = p.producto || "Producto";
    const stock = p.stock || 0;
    const img = p.imagen || "https://via.placeholder.com/150";

    const unidad = p.unidad || 0;
    const docena = p.docena || 0;
    const cajon = p.cajon || 0;

    html+=`
      <div class="card">

        <img src="${img}">

        <h3>${nombre}</h3>

        <p>📦 Stock: ${stock}</p>

        <p>Unidad: S/ ${unidad}</p>
        <p>Docena: S/ ${docena}</p>
        <p>Cajón: S/ ${cajon}</p>

        <button onclick="vender('${nombre}','unidad')">Vender Unidad</button>
        <button onclick="vender('${nombre}','docena')">Vender Docena</button>
        <button onclick="vender('${nombre}','cajon')">Vender Cajón</button>

      </div>
    `;
  });

  document.getElementById("productos").innerHTML = html;
}

// vender
function vender(prod,tipo){
  const link = FORM + "?" +
    ENTRY_PRODUCTO + "=" + encodeURIComponent(prod) +
    "&entry.tipo=" + tipo;

  window.open(link,"_blank");
}
</script>

</body>
</html>
