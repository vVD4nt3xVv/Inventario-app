<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&T KAMIARA - Sistema Oficial</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="toast">¡Añadido con éxito!</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2 style="color:#5cb85c; letter-spacing:2px;">A&T KAMIARA</h2>
    <p style="font-size:11px; color:#666;">CONTROL DE INVENTARIO V.2026</p>
    <input id="u" placeholder="Usuario">
    <input id="p" type="password" placeholder="Contraseña">
    <button onclick="login()">INGRESAR AL SISTEMA</button>
    <p id="err" style="color:#d9534f; font-size:12px; margin-top:10px;"></p>
  </div>
</div>

<!-- APLICACIÓN PRINCIPAL -->
<div id="app" style="display:none;">
    <!-- BARRA SUPERIOR FIJA (3 COLUMNAS) -->
    <header class="top-nav">
        <div class="nav-col-izq">
            <span id="user-display"></span><br>
            <button class="btn-sm-red" onclick="salir()">Salir</button>
        </div>
        <div class="nav-col-cen">
            <button id="adminBtn" class="btn-sm-blue" style="display:none;" onclick="abrirAdmin()">PANEL ADMIN</button>
        </div>
        <div class="nav-col-der">
            <button class="btn-sm-green" onclick="verCarrito()">🛒 Carrito (<span id="count">0</span>)</button>
        </div>
    </header>

    <main id="content-area">
        <!-- VISTA INICIO -->
        <section id="v-inicio">
            <div id="portada">
                <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG">
            </div>
            <div class="grid-menu" id="menu-cats"></div>
        </section>

        <!-- VISTA PRODUCTOS (SCROLLABLE) -->
        <section id="v-productos" style="display:none;">
            <h2 class="section-title" id="cat-nombre">CATEGORÍA</h2>
            <div class="scroll-container" id="lista-prods"></div>
        </section>

        <!-- VISTA DETALLE -->
        <section id="v-detalle" style="display:none; padding:15px;">
            <div id="detalle-header" class="stock-info-bar">
                <div id="stock-total-div">ST. TOTAL: 0</div>
                <div id="stock-talla-div">ST. TALLA: 0</div>
                <div></div>
            </div>
            <div id="detalle-content"></div>
        </section>

        <!-- VISTA CARRITO -->
        <section id="v-carrito" style="display:none; padding:15px;">
            <h2 class="section-title">DETALLE DE COMPRA</h2>
            <div id="cart-list"></div>
            <div id="cart-total" class="total-display"></div>
        </section>

        <!-- VISTA VOUCHER -->
        <section id="v-voucher" style="display:none; padding:15px;">
            <div id="voucher-legal"></div>
            <div class="ws-input-container">
                <input type="tel" id="ws-phone" placeholder="WhatsApp del Cliente">
            </div>
        </section>
    </main>

    <!-- NAVEGACIÓN INFERIOR FIJA (3 COLUMNAS) -->
    <footer class="footer-nav" id="controles" style="display:none;">
        <button class="btn-nav-izq" id="btn-back">← Volver</button>
        <div></div> <!-- Espacio central libre -->
        <button class="btn-nav-der" id="btn-next">Acción</button>
    </footer>
</div>

<script src="app.js"></script>
</body>
</html>
