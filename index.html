<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inventario</title>

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial;
  margin: 0;
}

h2 {
  text-align: center;
}

#buscador {
  width: 90%;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.filtros {
  text-align: center;
}

.filtros button {
  margin: 5px;
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
}

#productos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 45%;
  margin: 10px;
  padding: 10px;
  border-radius: 15px;
  background: #111;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

img {
  width: 100%;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: red;
  color: white;
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>📦 Inventario</h2>

<input type="text" id="buscador" placeholder="Buscar producto...">

<div class="filtros">
  <button onclick="filtrar('')">Todos</button>
  <button onclick="filtrar('invierno')">Invierno</button>
  <button onclick="filtrar('verano')">Verano</button>
  <button onclick="filtrar('tecnologia')">Tecnología</button>
</div>

<div id="productos"></div>

<script>
const url = "https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";

// 🔥 CONFIGURA ESTO CUANDO TENGAS TU FORM
const FORM = "https://docs.google.com/forms/d/e/TU_FORM_ID/viewform";
const ENTRY_PRODUCTO = "entry.111111";
const ENTRY_CANTIDAD = "entry.222222";

let productos = [];

// 🎯 RENDER
function render(lista){
  let html = "";

  lista.forEach(p => {

    const nombre = p.producto || "Producto";
    const precio = p.precio || 0;
    const stock = p.stock || 0;
    const imagen = p.imagen || "https://via.placeholder.com/150";

    const colorStock = stock <= 5 ? 'red' : stock <= 10 ? 'orange' : 'lime';

    const linkVenta = `${FORM}?${ENTRY_PRODUCTO}=${encodeURIComponent(nombre)}&${ENTRY_CANTIDAD}=1`;

    html += `
      <div class="card">
        <img src="${imagen}">
        <h3>${nombre}</h3>
        <p>💲 S/ ${precio}</p>
        <p style="color:${colorStock};">
          📦 Stock: ${stock}
        </p>

        <a href="${linkVenta}" target="_blank">
          <button>VENDER</button>
        </a>
      </div>
    `;
  });

  document.getElementById("productos").innerHTML = html;
}

// 📥 CARGAR DATOS
fetch(url)
.then(r => r.json())
.then(data => {

  productos = data.map(p => {
    let obj = {};
    Object.keys(p).forEach(k=>{
      obj[k.trim().toLowerCase()] = p[k];
    });
    return obj;
  });

  render(productos);
});

// 🔍 BUSCADOR
document.getElementById("buscador").addEventListener("input", e => {
  const texto = e.target.value.toLowerCase();

  const filtrados = productos.filter(p =>
    (p.producto || "").toLowerCase().includes(texto)
  );

  render(filtrados);
});

// 🧊 FILTRO
function filtrar(cat){
  const filtrados = productos.filter(p =>
    (p.categoria || "").toLowerCase().includes(cat)
  );

  render(filtrados);
}
</script>

</body>
</html>
