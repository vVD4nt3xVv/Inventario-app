<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
  font-size:15px;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.login-box input, .login-box button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  font-size:14px;
}

.login-box input {background:#222;color:white;}
.login-box button {background:red;color:white;}

#errorLogin {color:#ff4d4d;}

/* HEADER */
#userInfo {
  text-align:center;
  margin-top:10px;
  font-weight:bold;
  font-size:16px;
}

/* BOTONES */
.top-buttons {
  display:flex;
  justify-content:space-between;
  margin:10px;
}

.btn-salir {background:red;}
.btn-admin {background:#007bff;display:none;}
.btn-carrito {background:#00c853;}

.top-buttons button {
  padding:8px 18px;
  border-radius:8px;
  font-size:13px;
  border:none;
  color:white;
}

/* PORTADA */
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {text-align:center;font-size:24px;}
.sub {text-align:center;color:gray;font-size:14px;}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.menu-card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.menu-card p {
  font-size:16px;
}

/* PRODUCTOS */
#productos {
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.card h3 {font-size:16px;}
.card p {font-size:14px;}

/* DETALLE */
.detalle-img {
  width:100%;
  border-radius:15px;
}

/* FILA */
.fila-opciones {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  gap:10px;
  text-align:center;
  font-size:14px;
}

.fila-opciones div {
  flex:1;
}

/* BOTONES */
.fila-botones {
  display:flex;
  justify-content:space-between;
  gap:10px;
}
.fila-botones button {
  width:auto;
  flex:1;
}

/* COLORES */
.stock {color:#00ff88;font-weight:bold;}
.total {color:#00aaff;font-weight:bold;}

select {
  background:#222;
  color:white;
  border:none;
  border-radius:8px;
  padding:6px;
}

/* RADIO */
input[type="radio"] {
  accent-color:#00ff88;
}

/* TABLA */
table {
  width:100%;
  margin-top:10px;
  background:#111;
  border-radius:10px;
  text-align:center;
}
th {color:#00ff88;}
th,td {padding:8px;}

/* BOTONES */
button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
}

/* TOAST */
#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:12px;
  border-radius:10px;
  opacity:0;
}
#toast.show {opacity:1;}
</style>
</head>

<body>

<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario">
    <input id="password" type="password">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-carrito" onclick="verCarrito()">🛒</button>
  <button class="btn-admin" id="panelBtn" onclick="abrirPanel()">Panel</button>
</div>

<div id="menu" class="grid-menu"></div>
<div id="productos"></div>

</div>

<div id="toast"></div>

<script>

let carrito=[];
let detalleActual=[];
let ultimaVista="menu";

function mostrarToast(msg){
  toast.innerText=msg;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),2000);
}

function agregarCarrito(){
  const radios=document.getElementsByName("prodSelect");
  let index=-1;
  radios.forEach((r,i)=>{if(r.checked) index=i;});

  if(index===-1){
    mostrarToast("Selecciona producto");
    return;
  }

  const item=detalleActual[index];
  carrito.push({...item,cantidad:1});

  mostrarToast(item.producto+" agregado");
}

function verCarrito(){

  let html="<h2 style='text-align:center;'>🛒 Carrito</h2>";

  if(carrito.length===0){
    html+="<p style='text-align:center;'>Carrito vacío</p>";
    html+=`<div class="fila-botones">
      <button onclick="volverAtras()">⬅ Volver</button>
    </div>`;
    productos.innerHTML=html;
    return;
  }

  let total=0;

  html+=`
  <table>
  <tr>
  <th>Producto</th>
  <th>Talla</th>
  <th>Color</th>
  <th>Cant</th>
  <th>Precio</th>
  <th></th>
  </tr>`;

  carrito.forEach((c,i)=>{

    let precio=c.unidad;
    if(c.cantidad>=12){
      precio=c.docena/12;
    }

    const subtotal=precio*c.cantidad;
    total+=subtotal;

    html+=`
    <tr>
    <td>${c.producto}</td>
    <td>${c.talla}</td>
    <td>${c.color}</td>
    <td>
    <button onclick="restar(${i})">-</button>
    ${c.cantidad}
    <button onclick="sumar(${i})">+</button>
    </td>
    <td>S/ ${subtotal.toFixed(2)}</td>
    <td><button onclick="eliminarItem(${i})">❌</button></td>
    </tr>`;
  });

  html+=`</table>
  <p style="text-align:center;">P.UNIDAD → cambia a DOCENA desde 12</p>

  <div style="text-align:center;">
  Descuento: <input id="descuento" type="number" value="0" style="width:80px;">
  </div>

  <h3 style="text-align:center;">TOTAL: S/ ${total.toFixed(2)}</h3>

  <div class="fila-botones">
  <button onclick="volverAtras()">⬅ Volver</button>
  <button style="background:#00c853;" onclick="comprar()">COMPRAR</button>
  </div>`;

  productos.innerHTML=html;
}

function sumar(i){
  carrito[i].cantidad++;
  verCarrito();
}

function restar(i){
  carrito[i].cantidad--;
  if(carrito[i].cantidad<=0){
    carrito.splice(i,1);
  }
  verCarrito();
}

function eliminarItem(i){
  carrito.splice(i,1);
  verCarrito();
}

function volverAtras(){
  inicio();
}

function comprar(){

  let total=0;
  const desc=parseFloat(document.getElementById("descuento").value)||0;

  carrito.forEach(c=>{
    let precio=c.unidad;
    if(c.cantidad>=12){
      precio=c.docena/12;
    }
    total+=precio*c.cantidad;
  });

  total-=desc;

  mostrarToast("Venta S/ "+total.toFixed(2));

  carrito=[];
  inicio();
}

</script>

</body>
</html>
