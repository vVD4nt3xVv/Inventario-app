<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
  font-size:15px;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.login-box input, .login-box button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
}

.login-box input {background:#222;color:white;}
.login-box button {background:red;color:white;}

/* HEADER */
#userInfo {
  text-align:center;
  margin-top:10px;
  font-weight:bold;
}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

/* PRODUCTOS */
#productos {
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

/* BOTONES */
button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  margin-top:5px;
}

/* 🛒 CARRITO */
#carrito {
  display:none;
  padding:10px;
}

.carrito-box {
  background:#111;
  border-radius:15px;
  padding:12px;
}

.carrito-titulo {
  text-align:center;
  font-weight:bold;
  margin-bottom:10px;
}

.carrito-item {
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr 1fr;
  text-align:center;
  font-size:13px;
  padding:6px;
  border-bottom:1px solid #333;
  align-items:center;
}

.carrito-item button {
  padding:5px;
  font-size:12px;
}

.carrito-total {
  text-align:right;
  font-weight:bold;
  color:#00aaff;
  margin-top:10px;
}

.btn-green {
  background:green;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3>LOGIN</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="userInfo"></div>

<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir()">INVENTARIO</div>
</div>

<div id="productos"></div>

<!-- 🛒 CARRITO -->
<div id="carrito"></div>

</div>

<script>

/* LOGIN SIMPLE */
function login(){
  localStorage.setItem("user","ok");
  location.reload();
}

window.onload=()=>{
  if(localStorage.getItem("user")){
    login.style.display="none";
    app.style.display="block";
  }
};

/* INVENTARIO */
let inventario=[];
fetch("https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO")
.then(r=>r.json())
.then(d=>inventario=d);

/* CARRITO */
let carrito=[];

/* ABRIR */
function abrir(){
  menu.style.display="none";
  productos.style.display="grid";

  let html="";
  inventario.forEach(p=>{
    html+=`
    <div class="card">
      <h3>${p.producto}</h3>
      <p>S/ ${p["p.unidad"]}</p>
      <button onclick="agregar('${p.id}')">Agregar</button>
    </div>`;
  });

  productos.innerHTML=html;
}

/* AGREGAR */
function agregar(id){

  const p = inventario.find(x=>x.id==id);
  if(!p) return;

  let item = carrito.find(x=>x.id==id);

  if(item){
    item.cantidad++;
  }else{
    carrito.push({
      id:p.id,
      producto:p.producto,
      unidad:parseFloat(p["p.unidad"]),
      docena:parseFloat(p["p.docena"]),
      cantidad:1
    });
  }

  renderCarrito();
}

/* SUMAR */
function sumar(id){
  let item = carrito.find(x=>x.id==id);
  item.cantidad++;
  renderCarrito();
}

/* RESTAR */
function restar(id){
  let item = carrito.find(x=>x.id==id);
  if(item.cantidad>1){
    item.cantidad--;
  } else {
    carrito = carrito.filter(x=>x.id!=id);
  }
  renderCarrito();
}

/* ELIMINAR */
function eliminar(id){
  carrito = carrito.filter(x=>x.id!=id);
  renderCarrito();
}

/* TOTAL */
function totalItem(p){
  if(p.cantidad < 12){
    return p.cantidad * p.unidad;
  }

  let d = Math.floor(p.cantidad/12);
  let r = p.cantidad%12;

  return (d*p.docena) + (r*p.unidad);
}

/* RENDER CARRITO */
function renderCarrito(){

  carrito.style.display="block";

  let total=0;

  let html=`
  <div class="carrito-box">
    <div class="carrito-titulo">🛒 CARRITO</div>

    <div class="carrito-item">
      <div>Producto</div>
      <div>Cant</div>
      <div>+</div>
      <div>-</div>
      <div>X</div>
    </div>
  `;

  carrito.forEach(p=>{
    total += totalItem(p);

    html+=`
    <div class="carrito-item">
      <div>${p.producto}</div>
      <div>${p.cantidad}</div>

      <button onclick="sumar('${p.id}')">+</button>
      <button onclick="restar('${p.id}')">-</button>
      <button onclick="eliminar('${p.id}')">❌</button>
    </div>`;
  });

  html+=`
    <div class="carrito-total">
      TOTAL: S/ ${total.toFixed(2)}
    </div>
  </div>`;

  document.getElementById("carrito").innerHTML=html;
}

</script>

</body>
</html>
